import_configs:
- id: peh:ENRICHMENT_TEST_IMPORT_CONFIG
  layout: peh:ENRICHMENT_TEST_DATA_LAYOUT
  section_mapping:
    section_mapping_links:
    - section: peh:ENRICHMENT_TEST_SUBJECTUNIQUE
      observation_id_list:
      - peh:ENRICHMENT_TEST_OBSERVATION_SUBJECTUNIQUE_INGESTED
    - section: peh:ENRICHMENT_TEST_ENRICH
      observation_id_list:
      - peh:ENRICHMENT_TEST_OBSERVATION_SUBJECT_ENRICHED_BASE
layouts:
- id: peh:ENRICHMENT_TEST_DATA_LAYOUT
  name: ENRICHMENT_TEST_DATA_LAYOUT
  ui_label: ENRICHMENT_TEST_DATA_LAYOUT
  sections:
  - id: peh:ENRICHMENT_TEST_SUBJECTUNIQUE
    ui_label: SUBJECTUNIQUE
    observable_entity_type: person
    section_type: data_table
    elements:
    - label: id_subject
      observable_property: peh:id_subject
      is_observable_entity_key: true
    - label: current_year
      observable_property: peh:current_year
    - label: current_month
      observable_property: peh:current_month
    - label: N1BirthWeight
      observable_property: peh:N1BirthWeight
    - label: N1BirthLength
      observable_property: peh:N1BirthLength
  - id: peh:ENRICHMENT_TEST_ENRICH
    ui_label: ENRICH_BASE
    observable_entity_type: person
    section_type: data_table
    elements:
    - label: id_subject
      observable_property: peh:id_subject
      is_observable_entity_key: true
      foreign_key_link:
        section: peh:ENRICHMENT_TEST_SUBJECTUNIQUE
        label: id_subject
    - label: current_year
      observable_property: peh:current_year
    - label: current_month
      observable_property: peh:current_month
    - label: N2BirthWeight
      observable_property: peh:N2BirthWeight
