    - peh:current_month
    - peh:current_day
    - peh:N1Birthdate
  observation_result_id_list:
  - peh:INGESTION_RESULT_20251001_01
- id: peh:ENRICHMENT_TEST_OBSERVATION_SUBJECT_ENRICHED_BASE
